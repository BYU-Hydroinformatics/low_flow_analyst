        // ===== Drought Conditions =====
        async function loadDrought(siteNo) {
            const container = document.getElementById('drought-container');
            container.innerHTML = '<div class="loading"><span class="spinner"></span> Fetching drought data...</div>';

            try {
                const resp = await fetch(`/api/gage/${siteNo}/drought`);
                const data = await resp.json();
                if (data.error) {
                    container.innerHTML = `<div class="error-msg">${data.error}</div>`;
                    return;
                }
                renderDroughtSection(data, siteNo, container);
            } catch (e) {
                container.innerHTML = `<div class="error-msg">Failed to load drought data: ${e.message}</div>`;
            }
        }

        function renderDroughtSection(data, siteNo, container) {
            // Determine badge class from current level
            let badgeClass = 'drought-none';
            const lvl = data.current_level;
            if (lvl.startsWith('D4')) badgeClass = 'drought-d4';
            else if (lvl.startsWith('D3')) badgeClass = 'drought-d3';
            else if (lvl.startsWith('D2')) badgeClass = 'drought-d2';
            else if (lvl.startsWith('D1')) badgeClass = 'drought-d1';
            else if (lvl.startsWith('D0')) badgeClass = 'drought-d0';

            container.innerHTML = `
                <div style="margin-bottom:16px">
                    <div style="font-size:12px;color:#666;margin-bottom:4px">Current Drought Status (County FIPS: ${data.fips})</div>
                    <span class="drought-badge ${badgeClass}">${data.current_level}</span>
                </div>
                <div class="plot-container">
                    ${plotHeader('Drought Severity Timeline (County)', 'plot-drought', 'Since 2000')}
                    <div class="plot-div" id="plot-drought"></div>
                </div>
            `;

            setTimeout(() => renderDroughtChart(data, siteNo), 50);
        }

        function renderDroughtChart(data, siteNo) {
            // Format dates: USDM returns YYYYMMDD strings
            const dates = data.dates.map(d => {
                const s = String(d);
                if (s.length === 8) return s.slice(0,4) + '-' + s.slice(4,6) + '-' + s.slice(6,8);
                return s;
            });

            const traces = [
                { x: dates, y: data.D4, name: 'D4 Exceptional', stackgroup: 'one', fillcolor: '#730000', line: { width: 0, color: '#730000' } },
                { x: dates, y: data.D3, name: 'D3 Extreme', stackgroup: 'one', fillcolor: '#e60000', line: { width: 0, color: '#e60000' } },
                { x: dates, y: data.D2, name: 'D2 Severe', stackgroup: 'one', fillcolor: '#ffaa00', line: { width: 0, color: '#ffaa00' } },
                { x: dates, y: data.D1, name: 'D1 Moderate', stackgroup: 'one', fillcolor: '#fcd37f', line: { width: 0, color: '#fcd37f' } },
                { x: dates, y: data.D0, name: 'D0 Abnormally Dry', stackgroup: 'one', fillcolor: '#ffff00', line: { width: 0, color: '#ffff00' } },
            ];

            renderChart('plot-drought', traces, {
                ...layoutDefaults,
                title: { text: `Drought Severity - County ${data.fips}`, font: { size: 13 } },
                xaxis: { ...layoutDefaults.xaxis, title: 'Date' },
                yaxis: { ...layoutDefaults.yaxis, title: '% of County Area', range: [0, 100] },
                height: 300,
                legend: { ...layoutDefaults.legend, traceorder: 'reversed' },
            });
        }

        // ===== Flow Anomaly Detection =====
        async function loadAnomalies(siteNo) {
            const container = document.getElementById('anomaly-container');
            container.innerHTML = '<div class="loading"><span class="spinner"></span> Detecting flow anomalies...</div>';

            try {
                const resp = await fetch(`/api/gage/${siteNo}/anomalies`);
                const data = await resp.json();
                if (data.error) {
                    container.innerHTML = `<div class="error-msg">${data.error}</div>`;
                    return;
                }
                renderAnomalies(data.events, container);
            } catch (e) {
                container.innerHTML = `<div class="error-msg">Failed to detect anomalies: ${e.message}</div>`;
            }
        }

        function renderAnomalies(events, container) {
            if (!events || events.length === 0) {
                container.innerHTML = '<div style="background:#f8f9fa;padding:12px;border-radius:8px;font-size:13px;color:#666;margin-bottom:16px">No significant flow anomalies detected in the record.</div>';
                return;
            }

            let html = '<div style="font-size:12px;color:#666;margin-bottom:8px;font-weight:600">Flow Anomalies (Top ' + events.length + ')</div>';
            html += '<div class="anomaly-list">';
            for (const ev of events) {
                const isLow = ev.type === 'low_flow';
                const icon = isLow ? '\u25BC' : '\u25B2';
                const typeLabel = isLow ? 'Extreme Low Flow' : 'Extreme High Flow';
                const cardClass = isLow ? 'low-flow' : 'high-flow';
                const iconColor = isLow ? '#e53935' : '#1e88e5';

                let droughtHtml = '';
                if (ev.drought_level) {
                    droughtHtml = `<div class="anomaly-drought"><span class="drought-badge drought-${ev.drought_level.toLowerCase()}">${ev.drought_level}</span></div>`;
                }

                html += `
                    <div class="anomaly-card ${cardClass}">
                        <div class="anomaly-card-header">
                            <span class="anomaly-icon" style="color:${iconColor}">${icon}</span>
                            <span>${typeLabel}</span>
                            <span class="anomaly-dates">${ev.start_date} \u2014 ${ev.end_date} (${ev.duration} days)</span>
                        </div>
                        <div>${ev.narrative}</div>
                        ${droughtHtml}
                    </div>
                `;
            }
            html += '</div>';
            container.innerHTML = html;
        }

        // ===== Skill Assessment =====
        async function loadSkill(siteNo) {
            const container = document.getElementById('skill-container');
            container.innerHTML = '<div class="loading"><span class="spinner"></span> Running skill assessment...</div>';

            let data;
            try {
                const resp = await fetch(`/api/gage/${siteNo}/skill`);
                data = await resp.json();
            } catch (e) {
                container.innerHTML = `<div class="error-msg">Failed to load skill assessment: ${e.message}</div>`;
                return;
            }
            if (data.error) {
                container.innerHTML = `<div class="error-msg">${data.error}</div>`;
                return;
            }

            forecastModalData = data;  // store for modal re-open
            const sep = data.separation;
            const fc = data.forecast;

            const fmtVal = (v, digits=4) => v !== null && v !== undefined ? v.toFixed(digits) : 'N/A';
            const fmtPct = (v) => v !== null && v !== undefined ? (v * 100).toFixed(1) + '%' : 'N/A';

            let html = '';

            // Metric cards
            html += '<div class="skill-metrics-grid">';
            html += `
                <div class="skill-metric-card">
                    <div class="skill-metric-label">Separation RMSE</div>
                    <div class="skill-metric-value">${fmtVal(sep.rmse)} m³/s</div>
                    <div class="skill-metric-sub">${sep.n_days} baseflow days (${fmtPct(sep.frac_strict)} of record)</div>
                </div>
                <div class="skill-metric-card">
                    <div class="skill-metric-label">Separation MAE</div>
                    <div class="skill-metric-value">${fmtVal(sep.mae)} m³/s</div>
                    <div class="skill-metric-sub">PyBFS vs strict-baseflow reference</div>
                </div>
                <div class="skill-metric-card forecast">
                    <div class="skill-metric-label">Forecast RMSE</div>
                    <div class="skill-metric-value">${fmtVal(fc.overall_rmse)} m³/s</div>
                    <div class="skill-metric-sub">${fc.n_sequences} qualifying sequence${fc.n_sequences !== 1 ? 's' : ''}</div>
                </div>
                <div class="skill-metric-card forecast">
                    <div class="skill-metric-label">Forecast MAE</div>
                    <div class="skill-metric-value">${fmtVal(fc.overall_mae)} m³/s</div>
                    <div class="skill-metric-sub">Across all baseflow sequences</div>
                </div>
            `;
            html += '</div>';

            // Separation residuals plot
            html += '<div class="skill-section-title">Separation Residuals (Baseflow-Dominated Days)</div>';
            html += `${plotHeader('Q \u2212 BF\u2099\u1d0f\u02e2 on Strict-Baseflow Days', 'plot-skill-sep', 'Scroll to zoom, drag to pan')}
                     <div class="plot-div" id="plot-skill-sep"></div>`;

            // Forecast sequences plot
            if (fc.n_sequences > 0) {
                html += '<div class="skill-section-title">Forecast Skill by Sequence</div>';
                html += `<button class="action-btn btn-skill" style="width:100%;margin-bottom:10px;font-size:12px;padding:8px"
                            onclick="openForecastModal(forecastModalData, 0)">
                            &#9654; View Hydrograph Sequences
                         </button>`;
                html += `${plotHeader('Per-Sequence RMSE & MAE', 'plot-skill-fc', '')}
                         <div class="plot-div" id="plot-skill-fc"></div>`;
            } else {
                html += '<div class="skill-no-seqs">No qualifying baseflow sequences found for forecast skill evaluation (need ≥ 30 consecutive baseflow-dominated days).</div>';
            }

            container.innerHTML = html;

            setTimeout(() => {
                // Separation residuals scatter
                const strictIdx = sep.strict_mask.map((v, i) => v ? i : -1).filter(i => i >= 0);
                const resDates = strictIdx.map(i => sep.dates[i]);
                const resVals = strictIdx.map(i => sep.residuals[i]);

                const zeroLine = { x: [sep.dates[0], sep.dates[sep.dates.length - 1]], y: [0, 0],
                    mode: 'lines', line: { color: '#999', width: 1, dash: 'dot' }, showlegend: false, hoverinfo: 'skip' };
                const resSeries = { x: resDates, y: resVals, mode: 'markers',
                    marker: { color: '#00897b', size: 4, opacity: 0.7 },
                    name: 'Residual (Q \u2212 BF)', hovertemplate: '%{x}<br>%{y:.4f} m³/s<extra></extra>' };

                renderChart('plot-skill-sep', [zeroLine, resSeries], {
                    margin: { l: 60, r: 20, t: 10, b: 50 },
                    xaxis: { type: 'date', rangeslider: { visible: true, thickness: 0.06 } },
                    yaxis: { title: { text: 'Residual (m³/s)', font: { size: 11 } }, zeroline: false },
                    legend: { orientation: 'h', y: 1.08 },
                    plot_bgcolor: '#fff', paper_bgcolor: '#fff',
                    font: { family: 'Inter,sans-serif', size: 11 },
                });

                // Per-sequence RMSE/MAE bar chart
                if (fc.n_sequences > 0) {
                    const seqLabels = fc.summary.map(s => `Seq ${s.seq} (${s.len}d)`);
                    const rmseVals = fc.summary.map(s => s.rmse);
                    const maeVals = fc.summary.map(s => s.mae);
                    const hoverTexts = fc.summary.map(s => `${s.start_date} — ${s.end_date}`);

                    const rmseBar = { x: seqLabels, y: rmseVals, type: 'bar', name: 'RMSE',
                        marker: { color: '#5c6bc0' }, text: hoverTexts, customdata: hoverTexts,
                        hovertemplate: '<b>%{x}</b><br>%{customdata}<br>RMSE: %{y:.4f} m³/s<extra></extra>' };
                    const maeBar = { x: seqLabels, y: maeVals, type: 'bar', name: 'MAE',
                        marker: { color: '#9fa8da' }, text: hoverTexts, customdata: hoverTexts,
                        hovertemplate: '<b>%{x}</b><br>%{customdata}<br>MAE: %{y:.4f} m³/s<extra></extra>' };

                    renderChart('plot-skill-fc', [rmseBar, maeBar], {
                        barmode: 'group',
                        margin: { l: 60, r: 20, t: 10, b: 80 },
                        xaxis: { tickangle: -30 },
                        yaxis: { title: { text: 'Error (m³/s)', font: { size: 11 } } },
                        legend: { orientation: 'h', y: 1.08 },
                        plot_bgcolor: '#fff', paper_bgcolor: '#fff',
                        font: { family: 'Inter,sans-serif', size: 11 },
                    });
                }

                // Auto-open forecast modal zoomed to the first sequence
                if (fc.n_sequences > 0) {
                    openForecastModal(data, 0);
                }
            }, 50);
        }

        // ===== Processing (original data) =====
        async function startProcessing(siteNo) {
            const btn = document.getElementById('process-btn');
            btn.disabled = true;
            btn.textContent = 'Starting...';

            const resp = await fetch(`/api/gage/${siteNo}/process`, { method: 'POST' });
            const result = await resp.json();

            if (result.error) {
                document.getElementById('progress-container').innerHTML = `<div class="error-msg">${result.error}</div>`;
                btn.disabled = false;
                btn.textContent = 'Retry';
                return;
            }
            if (result.status === 'already_done') { loadGageDetails(siteNo); return; }

            btn.style.display = 'none';
            startProgressTracking(siteNo, 'original');
        }

        // ===== Update Data (fresh USGS fetch, reuse existing params) =====
        async function startUpdate(siteNo) {
            const btn = document.getElementById('update-btn');
            btn.disabled = true;
            btn.textContent = 'Fetching...';

            const resp = await fetch(`/api/gage/${siteNo}/update`, { method: 'POST' });
            const result = await resp.json();

            if (result.error) {
                document.getElementById('progress-container').innerHTML = `<div class="error-msg">${result.error}</div>`;
                btn.disabled = false;
                btn.textContent = 'Update';
                return;
            }

            btn.style.display = 'none';
            document.getElementById('recalibrate-btn').style.display = 'none';
            startProgressTracking(siteNo, 'updated');
        }

        // ===== Recalibrate (fresh USGS fetch + full recalibration) =====
        async function startRecalibrate(siteNo) {
            const btn = document.getElementById('recalibrate-btn');
            btn.disabled = true;
            btn.textContent = 'Starting...';

            const resp = await fetch(`/api/gage/${siteNo}/recalibrate`, { method: 'POST' });
            const result = await resp.json();

            if (result.error) {
                document.getElementById('progress-container').innerHTML = `<div class="error-msg">${result.error}</div>`;
                btn.disabled = false;
                btn.textContent = 'Recalibrate';
                return;
            }

            btn.style.display = 'none';
            document.getElementById('update-btn').style.display = 'none';
            startProgressTracking(siteNo, 'recalibrated');
        }

        // ===== Progress Tracking =====
        function startProgressTracking(siteNo, source) {
            let secondsLeft = source === 'recalibrated' ? 130 : source === 'updated' ? 30 : 100;

            const container = document.getElementById('progress-container');
            container.innerHTML = `
                <div class="progress-section">
                    <div class="progress-message" id="progress-msg">Initializing...</div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>
                    <div class="progress-timer" id="countdown">${formatTime(secondsLeft)}</div>
                    <div class="progress-timer-label">Estimated time remaining</div>
                </div>
            `;

            countdownInterval = setInterval(() => {
                secondsLeft = Math.max(0, secondsLeft - 1);
                const el = document.getElementById('countdown');
                if (el) el.textContent = secondsLeft > 0 ? formatTime(secondsLeft) : 'Almost done...';
            }, 1000);

            const sourceParam = (source === 'updated' || source === 'recalibrated') ? `?source=${source}` : '';
            eventSource = new EventSource(`/api/gage/${siteNo}/progress${sourceParam}`);
            eventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                const msgEl = document.getElementById('progress-msg');
                const barEl = document.getElementById('progress-bar');
                if (msgEl) msgEl.textContent = data.message;
                if (barEl) barEl.style.width = data.progress + '%';

                if (data.done) {
                    cleanupProgress();
                    if (data.stage === 'done') {
                        if (source === 'updated' || source === 'recalibrated') {
                            hasUpdatedResults[siteNo] = true;
                            currentDataSource = 'updated';
                            // Reload panel to show tabs
                            loadGageDetails(siteNo);
                            // After panel reloads, switch to updated tab
                            setTimeout(() => {
                                showTabBar(siteNo);
                                loadInteractivePlots(siteNo, 'updated');
                            }, 300);
                        } else {
                            updateMarkerColor(siteNo, '#2e7d32');
                            const g = allGages.find(g => g.site_no === siteNo);
                            if (g) g.status = 'calibrated';
                            loadGageDetails(siteNo);
                        }
                    } else if (data.error) {
                        document.getElementById('progress-container').innerHTML = `<div class="error-msg">${data.message}</div>`;
                    }
                }
            };
            eventSource.onerror = function() { cleanupProgress(); };
        }

        function cleanupProgress() {
            if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
            if (eventSource) { eventSource.close(); eventSource = null; }
        }

        function updateMarkerColor(siteNo, color) {
            const marker = markerMap[siteNo];
            if (marker) marker.setStyle({ fillColor: color });
        }

        function addStarMarker(lat, lng) {
            const starHtml = `<div class="star-inner"><svg viewBox="0 0 24 24" width="18" height="18"><rect x="3" y="3" width="18" height="18" rx="2" fill="#FFD600" stroke="#FF8F00" stroke-width="1.5"/></svg></div>`;
            const icon = L.divIcon({
                html: starHtml,
                className: 'selected-star',
                iconSize: [18, 18],
                iconAnchor: [9, 9],
            });
            selectedStarMarker = L.marker([lat, lng], { icon: icon, interactive: false, zIndexOffset: 1000 });
            selectedStarMarker.addTo(map);
        }

        function removeStarMarker() {
            if (selectedStarMarker) {
                map.removeLayer(selectedStarMarker);
                selectedStarMarker = null;
            }
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            return m > 0 ? `${m}:${(s % 60).toString().padStart(2, '0')}` : `0:${(s % 60).toString().padStart(2, '0')}`;
        }

        // ===== Search =====
        // Full state name -> abbreviation mapping
        const STATE_NAME_TO_ABBR = {
            'ALABAMA':'AL','ALASKA':'AK','ARIZONA':'AZ','ARKANSAS':'AR','CALIFORNIA':'CA',
            'COLORADO':'CO','CONNECTICUT':'CT','DELAWARE':'DE','FLORIDA':'FL','GEORGIA':'GA',
            'HAWAII':'HI','IDAHO':'ID','ILLINOIS':'IL','INDIANA':'IN','IOWA':'IA',
            'KANSAS':'KS','KENTUCKY':'KY','LOUISIANA':'LA','MAINE':'ME','MARYLAND':'MD',
            'MASSACHUSETTS':'MA','MICHIGAN':'MI','MINNESOTA':'MN','MISSISSIPPI':'MS',
            'MISSOURI':'MO','MONTANA':'MT','NEBRASKA':'NE','NEVADA':'NV',
            'NEW HAMPSHIRE':'NH','NEW JERSEY':'NJ','NEW MEXICO':'NM','NEW YORK':'NY',
            'NORTH CAROLINA':'NC','NORTH DAKOTA':'ND','OHIO':'OH','OKLAHOMA':'OK',
            'OREGON':'OR','PENNSYLVANIA':'PA','RHODE ISLAND':'RI','SOUTH CAROLINA':'SC',
            'SOUTH DAKOTA':'SD','TENNESSEE':'TN','TEXAS':'TX','UTAH':'UT','VERMONT':'VT',
            'VIRGINIA':'VA','WASHINGTON':'WA','WEST VIRGINIA':'WV','WISCONSIN':'WI',
            'WYOMING':'WY','DISTRICT OF COLUMBIA':'DC','PUERTO RICO':'PR',
            'VIRGIN ISLANDS':'VI','GUAM':'GU',
        };
        const STATE_ABBRS = Object.values(STATE_NAME_TO_ABBR);

        function extractState(name) {
            if (!name) return '';
            const upper = name.toUpperCase();

            // 1. PRIORITY: Check for 2-letter abbreviations first (e.g. TX, AL., Ca)
            //    Scan from end to start since state abbr usually appears last
            const words = upper.replace(/[.,]+$/g, '').trim().split(/[\s,]+/);
            for (let i = words.length - 1; i >= 0; i--) {
                const w = words[i].replace(/[.]/g, '');
                if (w.length === 2 && STATE_ABBRS.includes(w)) return w;
            }

            // 2. FALLBACK: Check for full state names (e.g. "ALABAMA", "NEW YORK")
            //    Only if no abbreviation was found
            for (const [fullName, abbr] of Object.entries(STATE_NAME_TO_ABBR)) {
                if (upper.includes(fullName)) return abbr;
            }
            return '';
        }

        let searchActiveIdx = -1;

        function initSearch() {
            const input = document.getElementById('gage-search');
            const dropdown = document.getElementById('search-dropdown');

            input.addEventListener('input', () => {
                const q = input.value.trim();
                searchActiveIdx = -1;
                if (q.length < 2) { dropdown.classList.remove('visible'); return; }
                const results = searchGages(q, 3);
                renderSearchResults(results, dropdown, q);
            });

            input.addEventListener('keydown', (e) => {
                const items = dropdown.querySelectorAll('.search-item');
                if (!items.length) return;
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    searchActiveIdx = Math.min(searchActiveIdx + 1, items.length - 1);
                    updateActiveItem(items);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    searchActiveIdx = Math.max(searchActiveIdx - 1, 0);
                    updateActiveItem(items);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (searchActiveIdx >= 0 && items[searchActiveIdx]) {
                        items[searchActiveIdx].click();
                    } else if (items.length > 0) {
                        items[0].click();
                    }
                } else if (e.key === 'Escape') {
                    dropdown.classList.remove('visible');
                    input.blur();
                }
            });

            // Close dropdown on outside click
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-control')) {
                    dropdown.classList.remove('visible');
                }
            });
        }

        function searchGages(query, limit) {
            const q = query.toLowerCase();
            const scored = [];
            for (const g of allGages) {
                let score = 0;
                // Exact prefix match on site_no is highest priority
                if (g.site_no.startsWith(q)) score = 100 - (g.site_no.length - q.length);
                // Contains match on site_no
                else if (g.site_no.includes(q)) score = 50;
                // Name match
                else if (g.name.toLowerCase().includes(q)) score = 30;
                else continue;
                scored.push({ gage: g, score });
            }
            scored.sort((a, b) => b.score - a.score);
            return scored.slice(0, limit).map(s => s.gage);
        }

        function renderSearchResults(results, dropdown, query) {
            if (results.length === 0) {
                dropdown.innerHTML = '<div class="search-no-results">No gages found</div>';
                dropdown.classList.add('visible');
                return;
            }
            dropdown.innerHTML = results.map((g, i) => {
                const state = extractState(g.name);
                const isCalibrated = g.status === 'calibrated';
                const dotColor = isCalibrated ? '#2e7d32' : '#e65100';
                // Highlight matching part in site_no
                const q = query.toLowerCase();
                let idHtml = g.site_no;
                const idx = g.site_no.toLowerCase().indexOf(q);
                if (idx >= 0) {
                    idHtml = g.site_no.slice(0, idx) + '<b style="color:#1a73e8">' + g.site_no.slice(idx, idx + q.length) + '</b>' + g.site_no.slice(idx + q.length);
                }
                return `
                    <div class="search-item" data-site="${g.site_no}" onclick="selectSearchResult('${g.site_no}')">
                        <span class="search-item-dot" style="background:${dotColor}"></span>
                        <div class="search-item-text">
                            <div class="search-item-id">${idHtml}</div>
                            <div class="search-item-name">${g.name}</div>
                        </div>
                        ${state ? `<span class="search-item-state">${state}</span>` : ''}
                    </div>
                `;
            }).join('');
            dropdown.classList.add('visible');
        }

        function updateActiveItem(items) {
            items.forEach((el, i) => el.classList.toggle('active', i === searchActiveIdx));
        }

        function selectSearchResult(siteNo) {
            const dropdown = document.getElementById('search-dropdown');
            const input = document.getElementById('gage-search');
            dropdown.classList.remove('visible');
            input.value = '';

            // Zoom to gage and open panel
            const gage = allGages.find(g => g.site_no === siteNo);
            if (gage) {
                map.setView([gage.lat, gage.lng], 12, { animate: true });
            }
            openPanel(siteNo);
        }

        // ===== Forecast Sequence Modal =====

        let fcTransitioning = false;
        let overviewClickBound = false;

        // RMSE → hsla color (green=low error, red=high error)
        function rmseToColor(rmse, minR, maxR, alpha) {
            alpha = alpha !== undefined ? alpha : 1;
            if (rmse === null || isNaN(rmse) || minR === maxR)
                return `hsla(207,55%,52%,${alpha})`;
            const t   = Math.max(0, Math.min(1, (rmse - minR) / (maxR - minR)));
            const hue = Math.round(118 - 118 * t);
            const sat = Math.round(60 + 10 * t);
            const lum = Math.round(44 + 4 * (1 - t));
            return `hsla(${hue},${sat}%,${lum}%,${alpha})`;
        }

        // Filter all fc arrays down to a single sequence
        function fcSeqData(seqIdx) {
            const fc  = forecastModalData.forecast;
            const seq = fc.summary[seqIdx];
            const mask = fc.seq.map(s => s !== null && Math.round(s) === seq.seq);
            return {
                seq,
                dates: fc.dates.filter((_, i) => mask[i]),
                q:     fc.q.filter((_, i) => mask[i]),
                fc:    fc.fc.filter((_, i) => mask[i]),
            };
        }

        // Compute plot heights for all three panels from the modal's live dimensions
        function fcHeights() {
            const modalEl  = document.getElementById('forecast-modal');
            const headerEl = modalEl.querySelector('.fc-modal-header');
            const stripEl  = document.getElementById('fc-nav-strip');
            const labelH   = 28;
            const usable   = modalEl.clientHeight
                           - headerEl.offsetHeight
                           - (stripEl ? stripEl.offsetHeight : 0);
            const overviewH = Math.max(140, Math.floor(usable * 0.3) - labelH);
            const detailH   = Math.max(170, Math.floor(usable * 0.7) - labelH - 4);
            return { overviewH, detailH };
        }

        // Context x-range for zoomed panel (sequence ± 60 days)
        function fcContextRange(seqIdx) {
            const fc  = forecastModalData.forecast;
            const s   = fc.summary[seqIdx];
            const all = fc.dates;
            const si  = all.indexOf(s.start_date);
            const ei  = all.indexOf(s.end_date);
            return [all[Math.max(0, si - 60)], all[Math.min(all.length - 1, ei + 60)]];
        }

        function updateFcHeader(seqIdx) {
            const fc  = forecastModalData.forecast;
            const seq = fc.summary[seqIdx];
            const n   = fc.summary.length;
            const rmseStr = seq.rmse !== null ? seq.rmse.toFixed(4) : 'N/A';
            const maeStr  = seq.mae  !== null ? seq.mae.toFixed(4)  : 'N/A';
            document.getElementById('fc-modal-info').innerHTML = `
                <div class="fc-seq-label">Sequence ${seq.seq} <span style="font-weight:400;color:#aaa">of ${n}</span></div>
                <div class="fc-seq-meta">${seq.start_date} &mdash; ${seq.end_date} &nbsp;&middot;&nbsp; ${seq.len} days</div>
                <div class="fc-seq-metrics">
                    <span class="fc-seq-metric">RMSE: <b>${rmseStr} m&sup3;/s</b></span>
                    <span class="fc-seq-metric">MAE: <b>${maeStr} m&sup3;/s</b></span>
                </div>
            `;
            document.getElementById('fc-nav-prev').disabled = n <= 1;
            document.getElementById('fc-nav-next').disabled = n <= 1;
        }

        function updateNavStrip(seqIdx) {
            const fc    = forecastModalData.forecast;
            const rmses = fc.summary.map(s => s.rmse).filter(v => v !== null && !isNaN(v));
            const minR  = rmses.length ? Math.min(...rmses) : 0;
            const maxR  = rmses.length ? Math.max(...rmses) : 1;
            const strip = document.getElementById('fc-nav-strip');
            let html = '<span class="fc-strip-label">SEQUENCES</span>';
            fc.summary.forEach((s, i) => {
                const bg  = rmseToColor(s.rmse, minR, maxR, 1);
                const tip = `Seq ${s.seq}: ${s.start_date} — ${s.end_date}\n${s.len} days · RMSE ${s.rmse !== null ? s.rmse.toFixed(4) : 'N/A'} m³/s`;
                html += `<div class="fc-seq-pill${i === seqIdx ? ' active' : ''}"
                              style="background:${bg}" onclick="gotoSequence(${i})"
                              title="${tip}">S${s.seq} &middot; ${s.len}d</div>`;
            });
            strip.innerHTML = html;
            const active = strip.querySelector('.active');
            if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }

        // Top panel: full hydrograph with all sequences as clickable colored regions
        function renderOverviewPanel(seqIdx) {
            const fc    = forecastModalData.forecast;
            const rmses = fc.summary.map(s => s.rmse).filter(v => v !== null && !isNaN(v));
            const minR  = rmses.length ? Math.min(...rmses) : 0;
            const maxR  = rmses.length ? Math.max(...rmses) : 1;
            const { overviewH } = fcHeights();

            const traces = [];

            const qMax = Math.max(...fc.q.filter(v => v !== null && !isNaN(v))) * 1.5 || 1;

            // Clickable filled region per sequence (traces 1..N → curveNumber maps to seqIdx)
            fc.summary.forEach((s, i) => {
                const isActive = i === seqIdx;
                const fill  = rmseToColor(s.rmse, minR, maxR, isActive ? 0.32 : 0.14);
                const line  = rmseToColor(s.rmse, minR, maxR, isActive ? 0.9 : 0.4);
                const rmseLabel = s.rmse !== null ? s.rmse.toFixed(4) : 'N/A';
                traces.push({
                    x: [s.start_date, s.end_date, s.end_date, s.start_date, s.start_date],
                    y: [0, 0, qMax, qMax, 0],
                    fill: 'toself', fillcolor: fill, mode: 'lines',
                    line: { color: line, width: isActive ? 1.5 : 0.5 },
                    name: `S${s.seq}`, showlegend: false,
                    hovertemplate: `<b>Seq ${s.seq}</b><br>${s.start_date} — ${s.end_date}<br>${s.len} days · RMSE ${rmseLabel} m³/s<br><i>Click to focus</i><extra></extra>`,
                    customdata: Array(5).fill(i),
                });
            });

            // Streamflow on top so it reads through the regions
            traces.push({
                x: fc.dates, y: fc.q, name: 'Observed Q', mode: 'lines',
                line: { color: '#37474F', width: 0.9 },
                hovertemplate: '%{x}: %{y:.3f} m³/s<extra>Q</extra>',
            });

            const annotations = fc.summary.map((s, i) => ({
                x: s.start_date, y: 1, yref: 'paper',
                text: `S${s.seq}`, showarrow: false,
                xanchor: 'left', yanchor: 'top',
                font: { size: 9, color: i === seqIdx ? '#1565C0' : '#BDBDBD' },
            }));

            Plotly.react('fc-modal-overview', traces, {
                margin: { l: 55, r: 12, t: 6, b: 32 },
                height: overviewH,
                plot_bgcolor: '#f9f9f9', paper_bgcolor: '#fff',
                font: { family: '-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif', size: 10 },
                hovermode: 'closest',
                showlegend: false,
                xaxis: { gridcolor: '#eee', zeroline: false },
                yaxis: { gridcolor: '#eee', zeroline: false, rangemode: 'tozero',
                         title: { text: 'Q (m³/s)', font: { size: 10 } } },
                annotations,
            }, { ...plotlyConfig, responsive: false });

            // Bind click handler once per modal open
            if (!overviewClickBound) {
                document.getElementById('fc-modal-overview').on('plotly_click', function(data) {
                    if (!data || !data.points.length) return;
                    const curve = data.points[0].curveNumber;
                    // Traces 0..N-1 are the sequence regions; last trace is the Q line
                    if (curve < forecastModalData.forecast.summary.length) {
                        gotoSequence(curve);
                    }
                });
                overviewClickBound = true;
            }
        }

        // Bottom-left: zoomed to active sequence ± context
        function renderHydPanel(seqIdx) {
            const { seq, dates: seqDates, q: seqQ } = fcSeqData(seqIdx);
            const [ctxStart, ctxEnd] = fcContextRange(seqIdx);
            const { detailH } = fcHeights();

            const traces = [
                { x: forecastModalData.forecast.dates, y: forecastModalData.forecast.q,
                  name: 'Observed Q', mode: 'lines', line: { color: '#546E7A', width: 1 } },
                { x: seqDates, y: seqQ, name: 'Active sequence', mode: 'lines',
                  line: { color: '#2196F3', width: 2.5 } },
            ];
            Plotly.react('fc-modal-hyd', traces, {
                margin: { l: 58, r: 12, t: 8, b: 42 }, height: detailH,
                plot_bgcolor: '#fafafa', paper_bgcolor: '#fff',
                font: { family: '-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif', size: 11 },
                hovermode: 'x unified',
                legend: { orientation: 'h', y: 1.06, font: { size: 10 } },
                xaxis: { gridcolor: '#e8e8e8', zeroline: false, range: [ctxStart, ctxEnd],
                         title: { text: 'Date', font: { size: 10 } } },
                yaxis: { gridcolor: '#e8e8e8', zeroline: false, rangemode: 'tozero',
                         title: { text: 'Flow (m³/s)', font: { size: 10 } } },
                shapes: [{ type: 'rect', x0: seq.start_date, x1: seq.end_date,
                    y0: 0, y1: 1, yref: 'paper',
                    fillcolor: 'rgba(33,150,243,0.08)',
                    line: { width: 1.5, color: '#2196F3' } }],
            }, { ...plotlyConfig, responsive: false });
        }

        // Bottom-right: forecast vs observed + error band
        function renderFcPanel(seqIdx) {
            const { dates: seqDates, q: seqQ, fc: seqFcVals } = fcSeqData(seqIdx);
            const residuals = seqQ.map((q, i) =>
                q !== null && seqFcVals[i] !== null ? q - seqFcVals[i] : null);
            const { detailH } = fcHeights();

            const traces = [
                { x: seqDates, y: residuals, name: 'Error (Q − Forecast)',
                  mode: 'lines', fill: 'tozeroy', fillcolor: 'rgba(244,67,54,0.12)',
                  line: { color: 'rgba(244,67,54,0.45)', width: 1 }, yaxis: 'y2' },
                { x: seqDates, y: seqFcVals, name: 'Forecast BF', mode: 'lines',
                  line: { color: '#5c6bc0', width: 2, dash: 'dash' } },
                { x: seqDates, y: seqQ, name: 'Observed Q', mode: 'lines',
                  line: { color: '#222', width: 1.5 } },
            ];
            Plotly.react('fc-modal-fc', traces, {
                margin: { l: 58, r: 50, t: 8, b: 42 }, height: detailH,
                plot_bgcolor: '#fafafa', paper_bgcolor: '#fff',
                font: { family: '-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif', size: 11 },
                hovermode: 'x unified',
                legend: { orientation: 'h', y: 1.06, font: { size: 10 } },
                xaxis: { gridcolor: '#e8e8e8', zeroline: false,
                         title: { text: 'Date', font: { size: 10 } } },
                yaxis: { gridcolor: '#e8e8e8', zeroline: false, rangemode: 'tozero',
                         title: { text: 'Flow (m³/s)', font: { size: 10 } } },
                yaxis2: { overlaying: 'y', side: 'right', zeroline: true,
                          zerolinecolor: '#f44336', zerolinewidth: 1, showgrid: false,
                          title: { text: 'Error (m³/s)', font: { size: 9, color: '#f44336' } },
                          tickfont: { color: '#f44336', size: 9 } },
            }, { ...plotlyConfig, responsive: false });
        }

        function openForecastModal(skillData, seqIdx) {
            forecastModalData = skillData;
            currentSeqIdx = seqIdx;
            overviewClickBound = false;
            document.getElementById('forecast-modal').classList.add('active');
            requestAnimationFrame(() => requestAnimationFrame(() => {
                updateFcHeader(seqIdx);
                updateNavStrip(seqIdx);
                renderOverviewPanel(seqIdx);
                renderHydPanel(seqIdx);
                renderFcPanel(seqIdx);
            }));
        }

        function closeForecastModal() {
            document.getElementById('forecast-modal').classList.remove('active');
            overviewClickBound = false;
            Plotly.purge('fc-modal-overview');
            Plotly.purge('fc-modal-hyd');
            Plotly.purge('fc-modal-fc');
        }

        function navigateForecast(dir) {
            const n = forecastModalData.forecast.summary.length;
            gotoSequence((currentSeqIdx + dir + n) % n);
        }

        async function gotoSequence(newIdx) {
            if (fcTransitioning || newIdx === currentSeqIdx) return;
            fcTransitioning = true;
            document.getElementById('forecast-modal').classList.add('transitioning');
            document.getElementById('fc-modal-fc').classList.add('fc-fading');

            currentSeqIdx = newIdx;
            updateFcHeader(newIdx);
            updateNavStrip(newIdx);
            // Re-render overview with new sequence highlighted
            renderOverviewPanel(newIdx);
            // Small pause so the overview highlight is visible before detail updates
            await new Promise(r => setTimeout(r, 120));
            renderHydPanel(newIdx);
            renderFcPanel(newIdx);
            document.getElementById('fc-modal-fc').classList.remove('fc-fading');
            document.getElementById('forecast-modal').classList.remove('transitioning');
            fcTransitioning = false;
        }

        // ===== Keyboard =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const fcModal = document.getElementById('forecast-modal');
                if (fcModal.classList.contains('active')) { closeForecastModal(); return; }
                const fs = document.getElementById('fs-overlay');
                if (fs.classList.contains('active')) { closeFullscreen(); return; }
                closePanel();
            }
            // Arrow key navigation for forecast modal
            if (document.getElementById('forecast-modal').classList.contains('active')) {
                if (e.key === 'ArrowLeft')  { navigateForecast(-1); return; }
                if (e.key === 'ArrowRight') { navigateForecast(1);  return; }
            }
            // Ctrl/Cmd+K to focus search
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                document.getElementById('gage-search').focus();
            }
        });

        // ===== Init =====
        loadFavorites();
        initMap();
        loadGages().then(() => initSearch());
    </script>
</body>
